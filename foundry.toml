[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# ─── L1 教学专用 profile ──────────────────────────────────────────────────
# 让 lessons/L1/ 这个独立教学文件夹既能编译、又能测试、又能跑部署脚本。
# 学员在工程根目录通过 FOUNDRY_PROFILE=l1 forge build / test / script 来切换。
[profile.l1]
src = "lessons/L1"
test = "lessons/L1"
script = "lessons/L1"
out = "out-l1"
libs = ["lib"]

# ─── L2 教学专用 profile ──────────────────────────────────────────────────
# 用法同 L1：FOUNDRY_PROFILE=l2 forge build / test / script
[profile.l2]
src = "lessons/L2"
test = "lessons/L2"
script = "lessons/L2"
out = "out-l2"
libs = ["lib"]

# ─── L3 教学专用 profile ──────────────────────────────────────────────────
# 用法同 L1/L2：FOUNDRY_PROFILE=l3 forge build / test / script
[profile.l3]
src = "lessons/L3"
test = "lessons/L3"
script = "lessons/L3"
out = "out-l3"
libs = ["lib"]

# ─── L4 教学专用 profile ──────────────────────────────────────────────────
# 用法同 L1/L2/L3：FOUNDRY_PROFILE=l4 forge build / test / script
[profile.l4]
src = "lessons/L4"
test = "lessons/L4"
script = "lessons/L4"
out = "out-l4"
libs = ["lib"]

# ─── L5 教学专用 profile ──────────────────────────────────────────────────
# 用法同 L1~L4：FOUNDRY_PROFILE=l5 forge build / test / script
[profile.l5]
src = "lessons/L5"
test = "lessons/L5"
script = "lessons/L5"
out = "out-l5"
libs = ["lib"]

# ─── L6 教学专用 profile ──────────────────────────────────────────────────
# 用法同 L1~L5：FOUNDRY_PROFILE=l6 forge build / test / script
[profile.l6]
src = "lessons/L6"
test = "lessons/L6"
script = "lessons/L6"
out = "out-l6"
libs = ["lib"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
